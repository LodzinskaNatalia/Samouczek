<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0%;
            padding: 0%;
        }
        body{
            display: flex;
            flex-direction: column;
            background-color: #faebd7;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            background-image: url(img/tlo1.png);
        }


        header{
            position: relative;
            display: flex;
            background-color: #FAD88E;
            font-size: 150%;
            padding: 2.5%;
            box-shadow: 0px 10px 5px 0px rgba(0, 0, 0, 0.418);
            border-bottom-right-radius: 5%;
            border-bottom-left-radius: 5%;
            margin-bottom: 2%;
            width: 100%;
            text-align: center;
            justify-content: center;
            align-items: center;
            
        }
        h1{
            position: relative;
            animation: h1 3s;
        }
        @keyframes h1{
            from{
                right: 40%;
                opacity: 0;
            }
            to{
                right: 0;
                opacity: 1;
            }
        }
        .img{
            display: flex;
            justify-content: center;
        }
        
        dt, h2{
            font-size: 200%;
            font-weight: bold;
            margin: 2%;
        }
        dd{
            font-size: 150%;
            margin: 2%;
        }
        li{
            margin-left: 2%;
            font-size: 125%;
            margin-bottom: 1%;
            
        }
        pre{
            font-size: 150%;
            background-color: lightgray;            
            margin: 2%;            
            border: 1px solid black;
            border-radius: 5px;
            box-shadow: 0 0 5px 5px rgba(131, 107, 1, 0.63);
        }
        header img{
            position: absolute;
            left: 2%;
            top: 50%;
            transform: translateY(-50%)
            
        }
        main{
            flex: 1;
        }
        footer{
            
            background-color: #FAD88E;
            padding: 0.5%;
            box-shadow: 0px -5px 5px 0px rgba(131, 107, 1, 0.63);
            border-top-left-radius: 10%;
            border-top-right-radius: 10%;
            text-align: center;
            width: 100%;
          
        }
        header img{
            position: absolute;
            left: 2%;
            top: 50%;
            transform: translateY(-50%)
            
        }
        nav{
            
            display: flex;
            flex-wrap: wrap;
            gap: 2%;
            padding-left: 0%;
            justify-content: center;
            align-items: center;
            
        }
        nav a{
            width: 30%;
            font-size: 200%;
            text-decoration: none;
            text-align: center;
            padding: 8px 12px;
            background-color: #FAD88E;
            color: black;
            box-shadow: 0 0 5px 5px rgba(131, 107, 1, 0.63);
            border-radius: 5px;
            margin: 0.5%;
        }
        nav a:hover{
            box-shadow: 0 0 5px 5px rgba(1, 31, 131, 0.63);
        }
        
        @media screen and (max-width: 780px) {
            header a{
                display: none;
            }
            pre{
                overflow: auto; 
            }
            img{
                display: none;
            }
            nav a{
                width: 80%;
                margin-bottom: 3%;
            }
        }

        
    </style>
</head>
<body>

        <a href="index.html"><img src="img/Domek.png"></a>
        <h1>Kurs css</h1>
    </header>

    </nav>
    </main>
    
    <footer>
        <p>Autor strony: Natalia Lodzińska</p>
    </footer>
    
</body>
</html>
